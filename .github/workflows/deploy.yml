name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1건만 유지 (진행 중 실행은 취소하지 않고 큐잉)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build static site
        run: node scripts/build.mjs
        env:
          # 프로젝트 Pages는 https://<user>.github.io/<repo>/ 하위 경로로 서빙됨
          BASE_PATH: /plumbing-service
          SITE_URL: https://guhara1.github.io/plumbing-service
      - name: Configure Pages
        # enablement:true → Pages가 비활성 상태면 워크플로가 자동 활성화 시도.
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
